<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sexy Chat UI</title>
    <link rel="stylesheet" href="test.css">
</head>

<body>
    <div class="chat-container">
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <label for="fileInput" class="file-label" title="Attach file">📎</label>
            <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.docx" />
            <input type="text" id="textInput" placeholder="Type a message" />
            <button id="sendBtn" class="send-btn">Send</button>
        </div>
    </div>
    <script src='test.js'></script>
</body>

</html>
